name: Check Links
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Lychee link check
        uses: lycheeverse/lychee-action@v1
        with:
          # 只检查外链；内部 .md 链接（指向尚未撰写的条目）不在本工作流范围内。
          # 学术站点（斯坦福百科、ctext 等）偶发超时，故 fail=false 让 CI 不误红，
          # 死链仅作为警告出现在 Action 日志里，便于后续清理。
          args: >-
            --accept 200,206,301,302,403,429
            --timeout 30
            --max-concurrency 4
            --retry-wait-time 5
            --cache .lycheecache
            --exclude-mail
            --exclude "(^mailto:)|(^#)|(\.md$)"
            --verbose
            "./**/*.md"
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
