name: Validate Entries
on:
  push:
    paths:
      - "content/philosophers/*.md"
      - "content/docs/*.md"
      - "content/README.md"
      - "mkdocs.yml"
  pull_request:
    paths:
      - "content/philosophers/*.md"
      - "content/docs/*.md"
      - "content/README.md"
      - "mkdocs.yml"
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Check required sections
        run: |
          keywords=("基本信息" "生平时间线" "核心思想" "代表作品" "对后世的影响" "经典名言" "延伸阅读")
          fail=0
          for f in content/philosophers/*.md; do
            [ "$(basename "$f")" = "index.md" ] && continue
            for k in "${keywords[@]}"; do
              if ! grep -Eq "^## .*${k}" "$f"; then
                echo "Missing section containing '"${k}"' in $f"; fail=1
              fi
            done
          done
          [ $fail -ne 0 ] && exit 1
          echo "All entries have required sections OK"
      - name: Run gen_index.py （只读校验）
        run: |
          python scripts/gen_index.py

  check-internal-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check internal philosopher links
        run: |
          set +e
          fail=0
          while IFS= read -r file; do
            while IFS= read -r line; do
              for link in $(echo "$line" | grep -oE "philosophers/[a-zA-Z0-9_-]+\.md"); do
                if [ ! -f "content/$link" ]; then
                  if ! echo "$line" | grep -q "尚未收录"; then
                    echo "::error file=$file::断链 $link （未标注「尚未收录」）"
                    fail=1
                  fi
                fi
              done
            done < "$file"
          done < <(find . -name "*.md" -not -path "./site/*" -not -path "./.git/*")
          if [ $fail -ne 0 ]; then
            echo "发现内部断链，请补全条目或在链接后标注「尚未收录」"
            exit 1
          fi
          echo "All internal philosopher links OK"
