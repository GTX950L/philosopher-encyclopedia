name: Validate Entries
on:
  push:
    paths:
      - "philosophers/*.md"
      - "docs/*.md"
      - "README.md"
      - "mkdocs.yml"
  pull_request:
    paths:
      - "philosophers/*.md"
      - "docs/*.md"
      - "README.md"
      - "mkdocs.yml"
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check required sections
        run: |
          keywords=("基本信息" "生平时间线" "核心思想" "代表作品" "对后世的影响" "经典名言" "延伸阅读")
          fail=0
          for f in philosophers/*.md; do
            [ "$(basename "$f")" = "index.md" ] && continue
            for k in "${keywords[@]}"; do
              if ! grep -Eq "^## .*${k}" "$f"; then
                echo "Missing section containing '"${k}"' in $f"; fail=1
              fi
            done
          done
          [ $fail -ne 0 ] && exit 1
          echo "All entries have required sections OK"
      - name: Run gen_index.py to validate consistency
        run: |
          python scripts/gen_index.py
          # 检查有无未提交的更改（gen_index会更新导航列表和计数）
          if ! git diff --quiet; then
            echo "::error::gen_index.py 产生了更改——请先在本地运行 python scripts/gen_index.py 再提交"
            git diff --stat
            exit 1
          fi
          echo "Index and navigation are consistent OK"

  check-internal-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check internal philosopher links
        run: |
          set +e
          fail=0
          while IFS= read -r file; do
            while IFS= read -r line; do
              for link in $(echo "$line" | grep -oE "philosophers/[a-zA-Z0-9_-]+\.md"); do
                if [ ! -f "$link" ]; then
                  if ! echo "$line" | grep -q "尚未收录"; then
                    echo "::error file=$file::断链 $link （未标注「尚未收录」）"
                    fail=1
                  fi
                fi
              done
            done < "$file"
          done < <(find . -name "*.md" -not -path "./site/*" -not -path "./.git/*")
          if [ $fail -ne 0 ]; then
            echo "发现内部断链，请补全条目或在链接后标注「尚未收录」"
            exit 1
          fi
          echo "All internal philosopher links OK"
