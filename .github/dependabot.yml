# 自动依赖更新配置
# 参考：https://docs.github.com/code-security/dependabot

version: 2
updates:

  # Python pip 依赖
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "pip"
    commit-message:
      prefix: "⬆️"
      include: "scope"
    reviewers:
      - "GTX950L"

  # GitHub Actions 工作流
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "⬆️"
      include: "scope"
